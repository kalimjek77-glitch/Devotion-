<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Breezy · Emotional Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* (Same CSS as before — unchanged for brevity) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #f2ede8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2c241e;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .fullscreen {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 1.5rem 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            background: linear-gradient(160deg, #f7f2ec 0%, #e8e0d8 100%);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        .fullscreen::-webkit-scrollbar {
            width: 4px;
        }
        .fullscreen::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .fullscreen::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .fullscreen {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid rgba(218, 207, 196, 0.4);
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 250, 245, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #d6c8bc;
            border-radius: 60px;
            padding: 0.6rem 1.4rem 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 470;
            color: #332a23;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            flex-shrink: 0;
        }
        .back-btn:active {
            transform: scale(0.94);
            background: #d6c7bb;
        }
        .back-btn i {
            font-size: 1.1rem;
            color: #5e4d3f;
        }
        .header-center {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }
        .header-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-icons .icon-robot {
            font-size: 2rem;
            color: #6d8f7a;
        }
        .header-icons .icon-feather {
            font-size: 1.8rem;
            color: #8a7566;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #2b211b;
            white-space: nowrap;
        }
        .header h1 span {
            font-weight: 300;
            font-size: 0.7rem;
            background: rgba(210, 195, 182, 0.5);
            color: #2b211b;
            padding: 0.1rem 0.8rem;
            border-radius: 40px;
            margin-left: 0.3rem;
        }
        .header-spacer {
            width: 80px;
            flex-shrink: 0;
        }
        @media (max-width: 480px) {
            .header {
                flex-wrap: nowrap;
                gap: 6px;
            }
            .back-btn {
                padding: 0.4rem 0.9rem 0.4rem 0.7rem;
                font-size: 0.8rem;
            }
            .back-btn i {
                font-size: 0.85rem;
            }
            .back-btn span {
                display: none;
            }
            .header-icons .icon-robot {
                font-size: 1.5rem;
            }
            .header-icons .icon-feather {
                font-size: 1.3rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .header h1 span {
                font-size: 0.55rem;
                padding: 0.05rem 0.5rem;
            }
            .header-spacer {
                width: 30px;
            }
        }
        @media (max-width: 380px) {
            .back-btn {
                padding: 0.3rem 0.6rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .header-icons .icon-robot {
                font-size: 1.2rem;
            }
            .header-icons .icon-feather {
                font-size: 1rem;
            }
            .header-spacer {
                width: 20px;
            }
        }
        @media (min-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .header-icons .icon-robot {
                font-size: 2.4rem;
            }
            .header-icons .icon-feather {
                font-size: 2.2rem;
            }
        }
        .subtitle {
            color: #5f5146;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            margin-bottom: 1.2rem;
            flex-shrink: 0;
            opacity: 0.8;
            padding: 0 0.5rem;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 1rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem 0.5rem 0.8rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 300px;
            max-height: 600px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e4dad2;
            border-radius: 20px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #b8a69a;
            border-radius: 20px;
        }
        .chat-messages {
            scrollbar-width: thin;
            scrollbar-color: #b8a69a #e4dad2;
        }
        .message-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 92%;
        }
        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message-wrapper.bot {
            align-self: flex-start;
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(176, 154, 139, 0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1.5px solid rgba(214, 200, 188, 0.5);
        }
        .avatar i {
            font-size: 1.2rem;
            color: #3f342c;
        }
        .message-wrapper.user .avatar {
            background: rgba(109, 143, 122, 0.3);
            border-color: rgba(109, 143, 122, 0.3);
        }
        .message-wrapper.user .avatar i {
            color: #4a6b5c;
        }
        .message {
            padding: 1rem 1.4rem;
            border-radius: 24px;
            font-size: 1.05rem;
            line-height: 1.7;
            word-wrap: break-word;
            animation: msgFadeIn 0.35s ease forwards;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            flex: 1;
        }
        @keyframes msgFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-wrapper.user .message {
            align-self: flex-end;
            background: rgba(176, 154, 139, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(176, 154, 139, 0.25);
            color: #2b211b;
            border-bottom-right-radius: 6px;
        }
        .message-wrapper.bot .message {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            color: #281f1a;
            border-bottom-left-radius: 6px;
        }
        .message .msg-meta {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message-wrapper.bot .msg-meta {
            color: #5f5146;
        }
        .message-wrapper.user .msg-meta {
            color: #5f5146;
            justify-content: flex-end;
        }
        .typing-indicator {
            align-self: flex-start;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(214, 200, 188, 0.4);
            border-radius: 24px;
            border-bottom-left-radius: 6px;
            padding: 0.8rem 1.4rem;
            display: none;
            gap: 6px;
            align-items: center;
            margin-left: 48px;
        }
        .typing-indicator.show {
            display: flex;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #8a7566;
            border-radius: 50%;
            animation: typingDot 1.2s ease-in-out infinite;
        }
        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingDot {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
        .input-area {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-top: 0.8rem;
            border-top: 2px solid rgba(218, 207, 196, 0.3);
            flex-shrink: 0;
            margin-top: 0.2rem;
            flex-wrap: wrap;
        }
        .input-area input {
            flex: 1;
            min-width: 160px;
            padding: 0.9rem 1.4rem;
            border: 2px solid rgba(214, 200, 188, 0.5);
            border-radius: 60px;
            font-size: 1.05rem;
            font-family: inherit;
            color: #2b211b;
            background: rgba(255, 250, 245, 0.5);
            backdrop-filter: blur(8px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-area input:focus {
            border-color: #b09a8b;
            box-shadow: 0 0 0 4px rgba(176, 154, 139, 0.15);
        }
        .input-area input::placeholder {
            color: #8f7c6e;
            font-style: italic;
            opacity: 0.7;
        }
        .input-area .send-btn {
            background: rgba(176, 154, 139, 0.5);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(138, 117, 102, 0.3);
            border-radius: 60px;
            padding: 0.9rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 470;
            color: #fcf7f2;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .input-area .send-btn:active {
            transform: scale(0.94);
            background: rgba(138, 117, 102, 0.6);
        }
        .input-area .send-btn i {
            font-size: 1.1rem;
        }
        .footer {
            flex-shrink: 0;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(160, 143, 128, 0.6);
            padding-top: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(220, 207, 196, 0.2);
        }
        .footer i {
            margin: 0 3px;
        }
        @media (max-width: 400px) {
            .fullscreen {
                padding: 1rem 0.8rem 1.5rem;
            }
            .message {
                font-size: 0.92rem;
                padding: 0.8rem 1rem;
            }
            .message-wrapper {
                max-width: 96%;
            }
            .input-area input {
                font-size: 0.92rem;
                padding: 0.7rem 1.2rem;
                min-width: 120px;
            }
            .input-area .send-btn {
                font-size: 0.9rem;
                padding: 0.7rem 1.2rem;
            }
            .chat-messages {
                max-height: 400px;
                min-height: 200px;
                padding: 0.4rem 0.2rem;
            }
            .subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.8rem;
            }
            .avatar {
                width: 30px;
                height: 30px;
            }
            .avatar i {
                font-size: 0.9rem;
            }
            .typing-indicator {
                margin-left: 40px;
            }
        }
        @media (min-width: 600px) {
            .chat-messages {
                max-height: 700px;
                min-height: 400px;
            }
            .message-wrapper {
                max-width: 82%;
            }
            .message {
                font-size: 1.15rem;
                padding: 1.2rem 1.8rem;
            }
            .input-area input {
                font-size: 1.15rem;
                padding: 1rem 1.8rem;
            }
            .input-area .send-btn {
                font-size: 1.15rem;
                padding: 1rem 2.2rem;
            }
            .subtitle {
                font-size: 1.05rem;
            }
        }
        @media (min-width: 900px) {
            .fullscreen {
                padding: 2.5rem 4rem 3rem;
                max-width: 1100px;
                margin: 0 auto;
            }
            .chat-messages {
                max-height: 800px;
                min-height: 450px;
            }
            .message-wrapper {
                max-width: 75%;
            }
            .message {
                font-size: 1.2rem;
            }
        }
        .chat-messages {
            scroll-behavior: smooth;
        }
        .message-wrapper.bot .message .heart-icon {
            color: #c47a7a;
            margin-right: 4px;
        }
    </style>
</head>
<body>

    <div class="fullscreen" id="app">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> <span>Back</span>
            </button>
            <div class="header-center">
                <div class="header-icons">
                    <i class="fas fa-robot icon-robot"></i>
                    <i class="fas fa-feather-alt icon-feather"></i>
                </div>
                <h1>Breezy <span>AI</span></h1>
            </div>
            <div class="header-spacer"></div>
        </div>
        <div class="subtitle">Tell me how you feel — I'm here to listen and encourage you ❤️</div>
        <!-- Chat -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Share your feelings, or just say what's on your mind…" autocomplete="off" />
                <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Ask</button>
            </div>
        </div>
        <div class="footer">
            <i class="fas fa-robot"></i> Breezy · Listening with love <i class="fas fa-feather-alt"></i>
        </div>
    </div>

    <script>
        // ============================================================
        // MASSIVE FEELINGS DATABASE — covers hundreds of emotions, sins,
        // confessions, doubts, problems, cheating, love life, and personal info
        // ============================================================

        const feelingsData = {

            // ----- SADNESS (expanded) -----
            sad: {
                keywords: ['sad', 'sorrow', 'grief', 'mourn', 'cry', 'weep', 'depressed', 'down', 'brokenhearted',
                    'heartbroken', 'grieving', 'blue', 'melancholy', 'tears', 'crying', 'sobbing', 'grief-stricken',
                    'heartache', 'painful', 'suffering', 'anguish', 'distress', 'misery', 'desolate', 'forlorn',
                    'woe', 'lament', 'weeping', 'bawling', 'sadness', 'saddened', 'downcast', 'crestfallen'
                ],
                responses: [{
                    advice: "I'm sorry you're feeling so sad. It's okay to let the tears flow — God sees every tear and holds them in His bottle. You are not forgotten, and this sadness will not last forever.",
                    verse: "Psalm 34:18 — 'The Lord is near to the brokenhearted and saves those who are crushed in spirit.'"
                }, {
                    advice: "Sadness can feel like a heavy blanket, but you are not alone. God is close to the brokenhearted and promises to bind up your wounds.",
                    verse: "Psalm 147:3 — 'He heals the brokenhearted and binds up their wounds.'"
                }, {
                    advice: "Even in your deepest sorrow, God is with you. He collects your tears and will turn your mourning into joy. Hold on to His promise.",
                    verse: "Revelation 21:4 — 'He will wipe every tear from their eyes. There will be no more death or mourning or crying or pain.'"
                }]
            },

            // ----- ANXIETY (expanded) -----
            anxious: {
                keywords: ['anxious', 'anxiety', 'worried', 'worry', 'stress', 'overwhelmed', 'panic', 'fearful',
                    'afraid', 'scared', 'nervous', 'troubled', 'dread', 'uneasy', 'fret', 'jittery', 'tense',
                    'restless', 'apprehensive', 'paranoid', 'agitated', 'concerned', 'distressed', 'edgy', 'frazzled',
                    'on edge', 'perturbed', 'spooked', 'stressed out', 'uptight'
                ],
                responses: [{
                    advice: "I hear your anxiety. The God of peace is greater than any storm. He promises to guard your heart and mind with a peace that doesn't make sense in the middle of chaos.",
                    verse: "Philippians 4:6-7 — 'Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God. And the peace of God, which transcends all understanding, will guard your hearts and your minds in Christ Jesus.'"
                }, {
                    advice: "Your worries are real, but they are not the final word. God holds tomorrow, and He holds you. Cast your worries on Him, one by one.",
                    verse: "1 Peter 5:7 — 'Cast all your anxiety on him because he cares for you.'"
                }, {
                    advice: "When anxiety whispers 'what if,' let faith whisper 'even if.' Even if everything falls apart, God is still with you. He has not given you a spirit of fear, but of power, love, and a sound mind.",
                    verse: "2 Timothy 1:7 — 'For God has not given us a spirit of fear, but of power and of love and of a sound mind.'"
                }]
            },

            // ----- ANGER (expanded) -----
            angry: {
                keywords: ['angry', 'anger', 'furious', 'rage', 'frustrated', 'bitter', 'resentful', 'irritated',
                    'annoyed', 'wrath', 'mad', 'outraged', 'enraged', 'fuming', 'livid', 'hostile', 'irate',
                    'seething', 'incensed', 'indignant', 'irritated', 'vexed', 'cross', 'grumpy', 'testy', 'touchy'
                ],
                responses: [{
                    advice: "I feel your anger. Anger can be a signal that something important is at stake. But don't let it control you — pause, breathe, and give your anger to God.",
                    verse: "Ephesians 4:26-27 — 'In your anger do not sin: Do not let the sun go down while you are still angry, and do not give the devil a foothold.'"
                }, {
                    advice: "It's okay to be angry, but don't let it take root. God understands your frustration and invites you to bring it to Him.",
                    verse: "Psalm 37:8 — 'Refrain from anger and turn from wrath; do not fret—it leads only to evil.'"
                }, {
                    advice: "Anger can be like fire — useful when controlled, destructive when wild. Ask God to help you channel your anger into something good.",
                    verse: "James 1:19-20 — 'Everyone should be quick to listen, slow to speak and slow to become angry, because human anger does not produce the righteousness that God desires.'"
                }]
            },

            // ----- FEAR (expanded) -----
            fear: {
                keywords: ['fear', 'terrified', 'scared', 'afraid', 'phobia', 'dread', 'frightened', 'panicked',
                    'horror', 'trembling', 'petrified', 'fright', 'terror', 'alarmed', 'jumpy', 'spooked',
                    'startled', 'intimidated', 'cowardly', 'timid', 'wary'
                ],
                responses: [{
                    advice: "Fear can be paralyzing, but you don't have to face it alone. God says, 'Fear not, for I am with you.' He is holding your hand.",
                    verse: "Isaiah 41:10 — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'"
                }, {
                    advice: "Your fear is valid, but it doesn't have to have the last word. God has given you a spirit not of fear but of power, love, and a sound mind.",
                    verse: "2 Timothy 1:7 — 'For God has not given us a spirit of fear, but of power and of love and of a sound mind.'"
                }, {
                    advice: "When you feel afraid, remember that you are in the palm of God's hand. Nothing can snatch you away. Let His perfect love drive out your fear.",
                    verse: "1 John 4:18 — 'There is no fear in love. But perfect love drives out fear.'"
                }]
            },

            // ----- LONELINESS (expanded) -----
            lonely: {
                keywords: ['lonely', 'loneliness', 'alone', 'isolated', 'abandoned', 'forsaken', 'unwanted', 'rejected',
                    'left out', 'desolate', 'neglected', 'solitary', 'lonesome', 'friendless', 'forgotten', 'alienated',
                    'withdrawn', 'remote', 'secluded', 'shunned'
                ],
                responses: [{
                    advice: "Loneliness can feel like a desert, but you are never truly alone. God promises never to leave you or forsake you. He is with you in the silence.",
                    verse: "Deuteronomy 31:8 — 'The Lord himself goes before you and will be with you; he will never leave you nor forsake you. Do not be afraid; do not be discouraged.'"
                }, {
                    advice: "Even when everyone else seems far away, God is closer than your breath. He knows your name, and He calls you His own.",
                    verse: "Isaiah 43:1 — 'Do not fear, for I have redeemed you; I have summoned you by name; you are mine.'"
                }, {
                    advice: "Loneliness is a heavy weight, but it can also be a time to draw closer to God. He is the friend who sticks closer than a brother.",
                    verse: "Psalm 25:16 — 'Turn to me and be gracious to me, for I am lonely and afflicted.'"
                }]
            },

            // ----- JOY (expanded) -----
            joy: {
                keywords: ['joy', 'happy', 'joyful', 'glad', 'delight', 'cheerful', 'blessed', 'excited', 'elated',
                    'ecstatic', 'thrilled', 'overjoyed', 'cheer', 'bliss', 'glee', 'merry', 'festive', 'jubilant',
                    'radiant', 'content', 'satisfied', 'fulfilled', 'grateful', 'thankful', 'appreciative', 'blessed',
                    'optimistic', 'encouraged', 'motivated', 'inspired', 'confident', 'victorious', 'triumphant',
                    'exultant', 'rejoicing', 'jovial', 'lively', 'sprightly'
                ],
                responses: [{
                    advice: "I'm so glad you're feeling joyful! This is a gift from God. Let your joy be a light to others, and thank the One who gives you every reason to smile.",
                    verse: "Nehemiah 8:10 — 'Do not grieve, for the joy of the Lord is your strength.'"
                }, {
                    advice: "Joy is a fruit of the Spirit, and it's wonderful to see it in you! Let this happiness remind you of God's faithfulness.",
                    verse: "Philippians 4:4 — 'Rejoice in the Lord always. I will say it again: Rejoice!'"
                }, {
                    advice: "Your joy is contagious! Remember that joy is not dependent on circumstances — it's rooted in the unshakeable love of God.",
                    verse: "Psalm 30:5 — 'Weeping may stay for the night, but rejoicing comes in the morning.'"
                }]
            },

            // ----- PEACE (expanded) -----

                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `ℹ️ ${chosen.advice}\n\n📖 ${chosen.verse}`;
                }

                // ----- 2. Check for "surprise me with a verse" -----
                if (/surprise me|random verse|give me a verse|show me a verse|encourage me today|verse please/i.test(
                        lower)) {
                    const verses = [
                        "🌟 Here's a verse for you:\n\n📖 **Isaiah 41:10** — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'\n\nYou are not alone. God is with you today. 🙏",
                        "💪 You can do all things through Christ who strengthens you.\n\n📖 **Philippians 4:13** — 'I can do all this through him who gives me strength.'\n\nKeep going! God is your strength.",
                        "🌅 God has plans to prosper you and give you hope.\n\n📖 **Jeremiah 29:11** — 'For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.'\n\nHold on to that hope!",
                        "🕊️ Peace I leave with you; my peace I give you.\n\n📖 **John 14:27** — 'Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.'\n\nLet peace fill your heart today.",
                        "❤️ Nothing can separate you from God's love.\n\n📖 **Romans 8:38-39** — 'For I am convinced that neither death nor life... nor anything else in all creation, will be able to separate us from the love of God that is in Christ Jesus our Lord.'\n\nYou are deeply loved!"
                    ];
                    return verses[Math.floor(Math.random() * verses.length)];
                }

                // ----- 3. Check for sin/confession (high priority) -----
                const sinCheck = feelingsData.sin;
                let sinScore = 0;
                for (const kw of sinCheck.keywords) {
                    if (lower.includes(kw)) {
                        sinScore += 10;
                    }
                }
                if (sinScore >= 8) {
                    const resp = sinCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `🙏 I hear your confession. ${chosen.advice}\n\n📖 ${chosen.verse}\n\nYou are forgiven. 💖`;
                }

                // ----- 4. Check for doubt -----
                const doubtCheck = feelingsData.doubt;
                let doubtScore = 0;
                for (const kw of doubtCheck.keywords) {
                    if (lower.includes(kw)) {
                        doubtScore += 10;
                    }
                }
                if (doubtScore >= 8) {
                    const resp = doubtCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `❓ ${chosen.advice}\n\n📖 ${chosen.verse}`;
                }

                // ----- 5. Check for infidelity / betrayal -----
                const betrayalCheck = feelingsData.betrayal;
                let betrayalScore = 0;
                for (const kw of betrayalCheck.keywords) {
                    if (lower.includes(kw)) {
                        betrayalScore += 15;
                    }
                }
                if (betrayalScore >= 10) {
                    const resp = betrayalCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `💔 I hear your pain. ${chosen.advice}\n\n📖 ${chosen.verse}\n\nYou are not alone. 🙏`;
                }

                // ----- 6. Check for relationship -----
                const relCheck = feelingsData.relationship;
                let relScore = 0;
                for (const kw of relCheck.keywords) {
                    if (lower.includes(kw)) {
                        relScore += 12;
                    }
                }
                if (relScore >= 10) {
                    const resp = relCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `❤️ I hear you. ${chosen.advice}\n\n📖 ${chosen.verse}\n\nTrust God with your love life. 💕`;
                }

                // ----- 7. Financial -----
                const finCheck = feelingsData.financial;
                let finScore = 0;
                for (const kw of finCheck.keywords) {
                    if (lower.includes(kw)) {
                        finScore += 10;
                    }
                }
                if (finScore >= 8) {
                    const resp = finCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `💰 ${chosen.advice}\n\n📖 ${chosen.verse}\n\nGod is your provider. 🙏`;
                }

                // ----- 8. Health -----
                const healthCheck = feelingsData.health;
                let healthScore = 0;
                for (const kw of healthCheck.keywords) {
                    if (lower.includes(kw)) {
                        healthScore += 10;
                    }
                }
                if (healthScore >= 8) {
                    const resp = healthCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `🩺 ${chosen.advice}\n\n📖 ${chosen.verse}\n\nGod is with you in this. ❤️`;
                }

                // ----- 9. Loss -----
                const lossCheck = feelingsData.loss;
                let lossScore = 0;
                for (const kw of lossCheck.keywords) {
                    if (lower.includes(kw)) {
                        lossScore += 10;
                    }
                }
                if (lossScore >= 8) {
                    const resp = lossCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `🕊️ ${chosen.advice}\n\n📖 ${chosen.verse}\n\nYou are not alone in your grief. 🙏`;
                }

                // ----- 10. Career -----
                const careerCheck = feelingsData.career;
                let careerScore = 0;
                for (const kw of careerCheck.keywords) {
                    if (lower.includes(kw)) {
                        careerScore += 10;
                    }
                }
                if (careerScore >= 8) {
                    const resp = careerCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `💼 ${chosen.advice}\n\n📖 ${chosen.verse}\n\nGod is with you in your work. 🌟`;
                }

                // ----- 11. Decisions -----
                const decCheck = feelingsData.decisions;
                let decScore = 0;
                for (const kw of decCheck.keywords) {
                    if (lower.includes(kw)) {
                        decScore += 10;
                    }
                }
                if (decScore >= 8) {
                    const resp = decCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `🤔 ${chosen.advice}\n\n📖 ${chosen.verse}\n\nGod will guide you. 🙏`;
                }

                // ----- 12. Questions about God -----
                const questCheck = feelingsData.questions;
                let questScore = 0;
                for (const kw of questCheck.keywords) {
                    if (lower.includes(kw)) {
                        questScore += 10;
                    }
                }
                if (questScore >= 8) {
                    const resp = questCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `❓ ${chosen.advice}\n\n📖 ${chosen.verse}`;
                }

                // ----- 13. "I don't know" -----
                const idkCheck = feelingsData.idontknow;
                let idkScore = 0;
                for (const kw of idkCheck.keywords) {
                    if (lower.includes(kw)) {
                        idkScore += 10;
                    }
                }
                if (idkScore >= 8) {
                    const resp = idkCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `${chosen.advice}\n\n📖 ${chosen.verse}`;
                }

                // ----- 14. "Not okay" -----
                const notokCheck = feelingsData.notokay;
                let notokScore = 0;
                for (const kw of notokCheck.keywords) {
                    if (lower.includes(kw)) {
                        notokScore += 10;
                    }
                }
                if (notokScore >= 8) {
                    const resp = notokCheck.responses;
                    const chosen = resp[Math.floor(Math.random() * resp.length)];
                    return `🫂 ${chosen.advice}\n\n📖 ${chosen.verse}\n\nYou are not alone. 🙏`;
                }

                // ----- 15. General emotion detection -----
                let detectedEmotion = null;
                let bestScore = 0;
                // Skip categories we already checked
                const skipCategories = ['about', 'sin', 'doubt', 'betrayal', 'relationship', 'financial', 'health', 'loss',
                    'career', 'decisions', 'questions', 'idontknow', 'notokay'
                ];
                for (const [key, emotion] of Object.entries(feelingsData)) {
                    if (skipCategories.includes(key)) continue;
                    let score = 0;
                    for (const kw of emotion.keywords) {
                        if (lower.includes(kw)) {
                            const regex = new RegExp('\\b' + kw.replace(/'/g, "\\'") + '\\b', 'i');
                            if (regex.test(lower)) {
                                score += 15;
                            } else {
                                score += 8;
                            }
                        }
                    }
                    for (const kw of emotion.keywords) {
                        const patterns = ['feel ' + kw, 'feeling ' + kw, 'felt ' + kw, 'am ' + kw, 'so ' + kw, 'very ' + kw,
                            'feel like ' + kw, 'feeling like ' + kw
                        ];
                        for (const p of patterns) {
                            if (lower.includes(p)) {
                                score += 25;
                            }
                        }
                    }
                    if (score > bestScore) {
                        bestScore = score;
                        detectedEmotion = key;
                    }
                }

                if (detectedEmotion && bestScore >= 6) {
                    const emotion = feelingsData[detectedEmotion];
                    const responses = emotion.responses;
                    const chosen = responses[Math.floor(Math.random() * responses.length)];
                    const emojiMap = {
                        sad: '😢',
                        anxious: '😰',
                        angry: '😤',
                        fear: '😨',
                        lonely: '😔',
                        joy: '😊',
                        peace: '😌',
                        gratitude: '🙏',
                        discouraged: '😞',
                        guilty: '😣',
                        loved: '🥰',
                        confused: '🤔',
                        stressed: '😩',
                        insecure: '😥',
                        jealous: '😒',
                        hope: '🌟',
                        faith: '🙌',
                        courage: '💪',
                        patience: '⏳'
                    };
                    const emoji = emojiMap[detectedEmotion] || '❤️';
                    const emotionDisplay = detectedEmotion.charAt(0).toUpperCase() + detectedEmotion.slice(1);
                    const closings = [
                        "You are loved, and you are never alone. 🙏",
                        "God is with you, and He will never let you go. 🌟",
                        "Hold on — hope is on the way. 💪",
                        "You are precious in His sight. Let that sink in. 💖",
                        "Take a deep breath. He's got this. 🕊️",
                        "Don't give up — God is fighting for you. ⚔️",
                        "You are stronger than you think, because He is with you. 💪",
                        "Rest in His love today. ❤️"
                    ];
                    return `${emoji} I hear that you're feeling **${emotionDisplay}**.\n\n${chosen.advice}\n\n📖 ${chosen.verse}\n\n${closings[Math.floor(Math.random() * closings.length)]}`;
                }

                // ----- 16. Greeting -----
                if (/^(hi|hello|hey|greetings|good morning|good afternoon|good evening|howdy|sup|yo|hey there|hi there)/i
                    .test(lower) && lower.length < 50) {
                    return "Hello! I'm Breezy 🤖❤️. I'm here to listen to your heart. Tell me how you're feeling — sad, anxious, angry, lonely, joyful, or anything else — and I'll share encouragement and a Bible verse just for you. What's on your mind today?";
                }

                // ----- 17. Thanks -----
                if (/thank|thanks|appreciate|grateful/i.test(lower)) {
                    const thanks = [
                        "You're so welcome! ❤️ I'm glad I could encourage you. If you ever need to talk again, I'll be right here. God bless you! 🙏",
                        "It's my joy to help! Remember, God is always with you. 🌟",
                        "I'm here anytime you need a listening ear. You are loved! 💖"
                    ];
                    return thanks[Math.floor(Math.random() * thanks.length)];
                }

                // ----- 18. Direct encouragement -----
                if (/encourage|motivate|uplift|give me hope|need strength|need peace|need joy|lift me up|cheer me up|give me a word/i
                    .test(lower)) {
                    const encouragements = [
                        "🌟 You are stronger than you think, because God's strength is made perfect in weakness.\n\n📖 **Philippians 4:13** — 'I can do all this through him who gives me strength.'\n\nKeep going — God is with you every step of the way. 🙏",
                        "💪 You are not alone in this fight. God is your refuge and strength.\n\n📖 **Isaiah 41:10** — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'",
                        "🌅 Hope is not lost. God has plans to prosper you and give you a future.\n\n📖 **Jeremiah 29:11** — 'For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.'",
                        "🕊️ Peace I leave with you. Not as the world gives, but as Christ gives.\n\n📖 **John 14:27** — 'Peace I leave with you; my peace I give you. Do not let your hearts be troubled and do not be afraid.'"
                    ];
                    return encouragements[Math.floor(Math.random() * encouragements.length)];
                }

                // ----- 19. "How are you?" or "What do you do?" -----
                if (/how are you|what do you do|who are you|tell me about yourself/i.test(lower)) {
                    return "I'm Breezy 🤖❤️ — your emotional support companion created by Jojo Kalim. My only purpose is to listen to your heart and help you find hope and encouragement in God's Word. Tell me how you're feeling, and I'll share a verse and advice just for you. That's all I'm here for — to be a friend who listens. 💕";
                }

                // ----- 20. "Verse about" -----
                if (/verse about|scripture about|bible say about|what does the bible say about|give me a verse about/i
                    .test(lower)) {
                    const verses = [
                        "📖 **Isaiah 41:10** — 'So do not fear, for I am with you; do not be dismayed, for I am your God. I will strengthen you and help you; I will uphold you with my righteous right hand.'",
                        "📖 **Philippians 4:13** — 'I can do all this through him who gives me strength.'",
                        "📖 **Jeremiah 29:11** — 'For I know the plans I have for you, declares the Lord, plans to prosper you and not to harm you, plans to give you hope and a future.'",
                        "📖 **John 14:27** — 'Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.'",
                        "📖 **Romans 8:28** — 'And we know that in all things God works for the good of those who love him, who have been called according to his purpose.'",
                        "📖 **Psalm 23:4** — 'Even though I walk through the darkest valley, I will fear no evil, for you are with me; your rod and your staff, they comfort me.'",
                        "📖 **Joshua 1:9** — 'Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.'",
                        "📖 **2 Timothy 1:7** — 'For God has not given us a spirit of fear, but of power and of love and of a sound mind.'"
                    ];
                    return "Here's a verse for you:\n\n" + verses[Math.floor(Math.random() * verses.length)] +
                        "\n\nI hope this encourages you! 🙏";
                }

                // ----- 21. CATCH-ALL: ALWAYS RESPOND -----
                const catchAll = [
                    "I hear you. ❤️ Can you tell me more about how you're feeling right now? I'm here to listen and encourage you.",
                    "Thank you for sharing that with me. 🙏 How does that make you feel? I'm here to support you.",
                    "I'm listening. 💕 What's on your heart today? You can tell me anything — I'm here for you.",
                    "That sounds important to you. 🤔 Would you like to talk more about it? I'm here to help you find hope and encouragement.",
                    "I care about what you're going through. 🌟 Can you tell me how you're feeling about this situation?",
                    "You're not alone in this. 💖 I'm here to listen and share a verse that might encourage you. What's been on your mind?",
                    "I hear the weight in your words. 🫂 Let's talk about it. What do you need most right now — comfort, wisdom, or hope?",
                    "Thank you for trusting me with this. 🙏 God cares about every detail of your life. Would you like a verse of encouragement?",
                    "I'm here with you. ❤️ Whatever you're going through, God is with you too. Would you like to share more?",
                    "That's a lot to carry. 🫂 Let's bring it to God together. What's one thing you'd like me to pray about with you?"
                ];
                return catchAll[Math.floor(Math.random() * catchAll.length)];

            } catch (error) {
                console.warn('Error generating reply:', error);
                return "I'm here for you. ❤️ Sometimes I don't have the perfect words, but God does. He loves you and He's listening. Would you like to try sharing that again? 🙏";
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================

        sendBtn.addEventListener('click', function(e) {
            e.preventDefault();
            sendMessage();
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // ============================================================
        // WELCOME MESSAGE
        // ============================================================

        function showWelcome() {
            const welcomeText =
                "Hi, I'm Breezy 🤖❤️. I'm here to listen to your heart — no matter what you're feeling.\n\nJust tell me what's on your mind: sadness, anger, joy, stress, loneliness, relationship struggles, infidelity, financial problems, health concerns, loss, career decisions, or anything else. I'll share encouragement and a Bible verse to help you through.\n\nYou don't have to be okay. I'm here for you. What's going on today?";

            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper bot';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            wrapper.appendChild(avatar);
            const bubble = document.createElement('div');
            bubble.className = 'message';
            const textSpan = document.createElement('div');
            textSpan.style.whiteSpace = 'pre-wrap';
            textSpan.textContent = welcomeText;
            bubble.appendChild(textSpan);
            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.innerHTML = `Breezy · now`;
            bubble.appendChild(meta);
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
        }

        // ============================================================
        // INIT
        // ============================================================

        showWelcome();
        userInput.focus();

        console.log('❤️ Breezy Emotional Support loaded — always responds!');
        console.log('😊 Emotions covered:', Object.keys(feelingsData).length);
        console.log('🙏 Includes Jojo Kalim, April Joy Contiga, and location.');
    </script>
