<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇵🇭 Filipino Dama · Marble + Bargo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #1a1008;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            background: #2c1810;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
            border-radius: 12px;
        }

        /* ===== PLAYER SECTIONS ===== */
        .player-section {
            flex: 0 0 auto;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, #3d2318, #2c1810);
            border-bottom: 2px solid #5a3424;
            position: relative;
            z-index: 10;
            min-height: 52px;
            transition: all 0.4s ease;
        }

        .player-section.bottom {
            border-bottom: none;
            border-top: 2px solid #5a3424;
            background: linear-gradient(0deg, #3d2318, #2c1810);
        }

        .player-section .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-section .player-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            flex-shrink: 0;
            background: radial-gradient(circle at 30% 30%, #fff4e0, #b88a5a);
            box-shadow: inset 0 -4px 8px rgba(0,0,0,0.4);
        }

        .player-section .player-icon.p1 {
            background: radial-gradient(circle at 35% 30%, #ff8a8a, #a02020);
            box-shadow: 0 2px 12px rgba(255, 50, 50, 0.4);
        }

        .player-section .player-icon.p2 {
            background: radial-gradient(circle at 35% 30%, #7a8a9a, #1a1a2e);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }

        .player-section .player-name {
            color: #e8d5c4;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .player-section .player-name span {
            color: #c9a88a;
            font-weight: 300;
        }

        .player-section .piece-count {
            background: rgba(0, 0, 0, 0.5);
            color: #f5e6d3;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 32px;
            text-align: center;
        }

        .player-section .turn-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: all 0.4s ease;
            background: #ffd700;
            color: #1a1008;
        }

        .player-section .turn-badge.active {
            opacity: 1;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            animation: pulse-badge 1.2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .player-section .status-msg {
            font-size: 13px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            opacity: 0;
            transition: all 0.5s ease;
            position: absolute;
            right: 12px;
        }

        .player-section .status-msg.show {
            opacity: 1;
        }

        .player-section .status-msg.win {
            background: #ffd700;
            color: #1a1008;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            animation: win-pulse 0.8s ease-in-out infinite alternate;
        }

        .player-section .status-msg.lose {
            background: #c0392b;
            color: #fff;
            box-shadow: 0 0 40px rgba(192, 57, 43, 0.6);
            animation: lose-shake 0.5s ease-in-out 3;
        }

        @keyframes win-pulse {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08);
            }
        }

        @keyframes lose-shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-8px);
            }
            75% {
                transform: translateX(8px);
            }
        }

        /* ===== BOARD ===== */
        #board-wrapper {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            background: #1a1008;
            position: relative;
            min-height: 0;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1/1;
            background: #d4a56a;
            border-radius: 8px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6), 0 8px 40px rgba(0, 0, 0, 0.7);
            border: 4px solid #5a3424;
            position: relative;
            touch-action: none;
        }

        .square {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            cursor: pointer;
        }

        .square.light {
            background: #e8c99b;
        }

        .square.dark {
            background: #b88a5a;
        }

        .square.dark.highlight {
            background: #7ec87e;
            box-shadow: inset 0 0 20px rgba(46, 204, 113, 0.5);
            animation: glow-green 0.8s ease-in-out infinite alternate;
        }

        .square.dark.capture-highlight {
            background: #e74c3c;
            box-shadow: inset 0 0 20px rgba(231, 76, 60, 0.6);
            animation: glow-red 0.8s ease-in-out infinite alternate;
        }

        @keyframes glow-green {
            0% {
                box-shadow: inset 0 0 15px rgba(46, 204, 113, 0.3);
            }
            100% {
                box-shadow: inset 0 0 35px rgba(46, 204, 113, 0.7);
            }
        }

        @keyframes glow-red {
            0% {
                box-shadow: inset 0 0 15px rgba(231, 76, 60, 0.3);
            }
            100% {
                box-shadow: inset 0 0 35px rgba(231, 76, 60, 0.7);
            }
        }

        .square .move-dot {
            width: 28%;
            height: 28%;
            border-radius: 50%;
            background: rgba(46, 204, 113, 0.8);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            pointer-events: none;
            animation: dot-pop 0.3s ease-out;
        }

        .square .capture-dot {
            width: 30%;
            height: 30%;
            border-radius: 50%;
            background: rgba(231, 76, 60, 0.8);
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.6);
            pointer-events: none;
            animation: dot-pop 0.3s ease-out;
        }

        @keyframes dot-pop {
            0% {
                transform: scale(0);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== PIECES – MARBLE STONE STYLE ===== */
        .piece {
            width: 78%;
            height: 78%;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            touch-action: none;
            transition: all 0.2s ease;
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 6px 12px rgba(0, 0, 0, 0.6),
                inset 0 -4px 8px rgba(0, 0, 0, 0.4),
                inset 0 4px 8px rgba(255, 255, 255, 0.3);
            background: radial-gradient(circle at 35% 30%, #ffffffdd, #b0b0b0 60%, #505050);
            background-blend-mode: overlay;
        }

        .piece.p1 {
            background: radial-gradient(circle at 35% 30%, #ffb3b3, #c0392b 60%, #6b1a1a);
            border-color: rgba(255, 200, 200, 0.4);
            box-shadow: 
                0 6px 12px rgba(0, 0, 0, 0.6),
                inset 0 -4px 8px rgba(0, 0, 0, 0.5),
                inset 0 4px 8px rgba(255, 255, 255, 0.4);
        }

        .piece.p2 {
            background: radial-gradient(circle at 35% 30%, #b0c0d0, #2c3e50 60%, #0a0a0a);
            border-color: rgba(200, 200, 255, 0.2);
            box-shadow: 
                0 6px 12px rgba(0, 0, 0, 0.7),
                inset 0 -4px 8px rgba(0, 0, 0, 0.6),
                inset 0 4px 8px rgba(255, 255, 255, 0.2);
        }

        .piece::before {
            content: '';
            position: absolute;
            top: 12%;
            left: 20%;
            width: 35%;
            height: 20%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0) 80%);
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .piece.p2::before {
            opacity: 0.4;
        }

        .piece.king::after {
            content: '👑';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 45%;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
            pointer-events: none;
            z-index: 5;
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .piece.king {
            border-color: #ffd700 !important;
            box-shadow: 
                0 6px 16px rgba(255, 215, 0, 0.3),
                inset 0 -4px 8px rgba(0, 0, 0, 0.5),
                inset 0 4px 8px rgba(255, 255, 255, 0.5),
                0 0 30px rgba(255, 215, 0, 0.1);
        }

        .piece.selected {
            transform: scale(1.1);
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.6),
                0 6px 20px rgba(0, 0, 0, 0.7),
                inset 0 -4px 8px rgba(0, 0, 0, 0.5),
                inset 0 4px 8px rgba(255, 255, 255, 0.6);
            border-color: #ffd700 !important;
            z-index: 10;
            animation: selected-float 0.8s ease-in-out infinite alternate;
        }

        @keyframes selected-float {
            0% {
                transform: scale(1.08) translateY(-2px);
            }
            100% {
                transform: scale(1.14) translateY(2px);
            }
        }

        .piece.moving {
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        .piece.captured {
            animation: captured-pop 0.4s ease-out forwards;
        }

        @keyframes captured-pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4) rotate(20deg);
                opacity: 0.6;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .piece.promote {
            animation: promote-pop 0.6s ease-out;
        }

        @keyframes promote-pop {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.4) rotate(10deg);
            }
            60% {
                transform: scale(0.9) rotate(-5deg);
            }
            100% {
                transform: scale(1) rotate(0);
            }
        }

        /* ===== OVERLAYS ===== */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        #overlay.active {
            pointer-events: all;
        }

        #overlay .dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #overlay .dark-overlay.show {
            opacity: 1;
        }

        #overlay .game-over-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        #overlay .game-over-text.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #overlay .game-over-text.win-text {
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.5), 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        #overlay .game-over-text.lose-text {
            color: #ff4444;
            text-shadow: 0 0 40px rgba(255, 68, 68, 0.4), 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        /* ===== FIREWORKS CANVAS ===== */
        #fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 60;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #fireworks-canvas.active {
            opacity: 1;
            pointer-events: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 400px) {
            .player-section {
                padding: 4px 8px;
                min-height: 44px;
            }
            .player-section .player-icon {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .player-section .player-name {
                font-size: 12px;
            }
            .player-section .piece-count {
                font-size: 14px;
                padding: 1px 10px;
            }
            .player-section .turn-badge {
                font-size: 9px;
                padding: 3px 10px;
            }
            .player-section .status-msg {
                font-size: 11px;
                padding: 3px 10px;
            }
            #overlay .game-over-text {
                font-size: 30px;
            }
            .piece.king::after {
                font-size: 35%;
                top: -18%;
            }
        }

        @media (max-height: 700px) {
            .player-section {
                padding: 3px 8px;
                min-height: 38px;
            }
            .player-section .player-icon {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }
            .player-section .player-name {
                font-size: 11px;
            }
            .player-section .piece-count {
                font-size: 12px;
                padding: 1px 8px;
            }
            .player-section .turn-badge {
                font-size: 8px;
                padding: 2px 8px;
            }
            #board-wrapper {
                padding: 2px;
            }
            #board {
                border-width: 3px;
            }
            #overlay .game-over-text {
                font-size: 26px;
            }
            .piece.king::after {
                font-size: 32%;
                top: -16%;
            }
        }

        @media (min-height: 800px) {
            .player-section {
                padding: 10px 18px;
                min-height: 64px;
            }
            .player-section .player-icon {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
            .player-section .player-name {
                font-size: 17px;
            }
            .player-section .piece-count {
                font-size: 20px;
                padding: 4px 16px;
            }
            .player-section .turn-badge {
                font-size: 13px;
                padding: 6px 16px;
            }
            #overlay .game-over-text {
                font-size: 52px;
            }
            .piece.king::after {
                font-size: 50%;
                top: -22%;
            }
        }

        /* ===== RESTART BUTTON ===== */
        #restart-btn {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 70;
            padding: 8px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ffd700, #f0a500);
            color: #1a1008;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            letter-spacing: 1px;
            touch-action: manipulation;
        }

        #restart-btn.show {
            opacity: 1;
            pointer-events: all;
        }

        #restart-btn:active {
            transform: translateX(-50%) scale(0.94);
        }

        /* ===== SCROLLBAR HIDE ===== */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">

        <!-- TOP PLAYER -->
        <div class="player-section top" id="top-section">
            <div class="player-info">
                <div class="player-icon p1" id="top-icon">🔴</div>
                <div class="player-name">Player 1 <span>· Red</span></div>
            </div>
            <div class="piece-count" id="top-count">12</div>
            <div class="turn-badge" id="top-turn">● Turn</div>
            <div class="status-msg" id="top-status"></div>
        </div>

        <!-- BOARD -->
        <div id="board-wrapper">
            <div id="board"></div>
            <canvas id="fireworks-canvas"></canvas>
            <div id="overlay">
                <div class="dark-overlay" id="dark-overlay"></div>
                <div class="game-over-text" id="game-over-text"></div>
            </div>
            <button id="restart-btn">↻ New Game</button>
        </div>

        <!-- BOTTOM PLAYER -->
        <div class="player-section bottom" id="bottom-section">
            <div class="player-info">
                <div class="player-icon p2" id="bottom-icon">🔵</div>
                <div class="player-name">Player 2 <span>· Black</span></div>
            </div>
            <div class="piece-count" id="bottom-count">12</div>
            <div class="turn-badge" id="bottom-turn">● Turn</div>
            <div class="status-msg" id="bottom-status"></div>
        </div>

    </div>

    <script>
        // ============================================================
        //  FILIPINO DAMA – with "Bargo" rule: 
        //  You cannot capture if your piece will be recaptured immediately.
        //  King slides any distance, backward capture allowed.
        // ============================================================

        // --- DOM refs ---
        const boardEl = document.getElementById('board');
        const topCount = document.getElementById('top-count');
        const bottomCount = document.getElementById('bottom-count');
        const topTurn = document.getElementById('top-turn');
        const bottomTurn = document.getElementById('bottom-turn');
        const topStatus = document.getElementById('top-status');
        const bottomStatus = document.getElementById('bottom-status');
        const topSection = document.getElementById('top-section');
        const bottomSection = document.getElementById('bottom-section');
        const overlay = document.getElementById('overlay');
        const darkOverlay = document.getElementById('dark-overlay');
        const gameOverText = document.getElementById('game-over-text');
        const restartBtn = document.getElementById('restart-btn');
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');

        // --- Constants ---
        const SIZE = 8;
        const EMPTY = null;

        // --- State ---
        let board = [];
        let currentPlayer = 1; // 1 = top (red), 2 = bottom (black)
        let selected = null; // { row, col }
        let validMoves = []; // [{ row, col, capture: bool, captures: [{row, col}] }]
        let mustCapture = false;
        let captureChain = []; // [{ row, col }] captured pieces in current chain
        let isGameOver = false;
        let winner = null; // 1 or 2
        let isAnimating = false;

        // --- DOM helpers ---
        function $(sel, el = document) { return el.querySelector(sel); }

        function $$(sel, el = document) { return [...el.querySelectorAll(sel)]; }

        // --- Board init ---
        function initBoard() {
            const b = [];
            for (let r = 0; r < SIZE; r++) {
                b[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    const isDark = (r + c) % 2 === 1;
                    if (isDark && r < 3) b[r][c] = { player: 1, king: false };
                    else if (isDark && r > 4) b[r][c] = { player: 2, king: false };
                    else b[r][c] = null;
                }
            }
            return b;
        }

        // --- Board rendering ---
        function renderBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const sq = document.createElement('div');
                    const isDark = (r + c) % 2 === 1;
                    sq.className = `square ${isDark ? 'dark' : 'light'}`;
                    sq.dataset.row = r;
                    sq.dataset.col = c;

                    // Piece
                    const piece = board[r][c];
                    if (piece) {
                        const pEl = document.createElement('div');
                        pEl.className = `piece p${piece.player}${piece.king ? ' king' : ''}`;
                        if (selected && selected.row === r && selected.col === c) {
                            pEl.classList.add('selected');
                        }
                        pEl.dataset.row = r;
                        pEl.dataset.col = c;
                        sq.appendChild(pEl);

                        pEl.addEventListener('click', (e) => {
                            e.stopPropagation();
                            onPieceClick(r, c);
                        });
                        pEl.addEventListener('touchend', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            onPieceClick(r, c);
                        });
                    }

                    // Valid move indicators
                    const mv = validMoves.find(m => m.row === r && m.col === c);
                    if (mv) {
                        const dot = document.createElement('div');
                        dot.className = mv.capture ? 'capture-dot' : 'move-dot';
                        sq.appendChild(dot);
                        if (mv.capture) sq.classList.add('capture-highlight');
                        else sq.classList.add('highlight');
                    }

                    sq.addEventListener('click', () => onSquareClick(r, c));
                    sq.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        onSquareClick(r, c);
                    });

                    boardEl.appendChild(sq);
                }
            }
            updateCounts();
            updateTurnIndicators();
        }

        // --- Update counts ---
        function updateCounts() {
            let p1 = 0,
                p2 = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = board[r][c];
                    if (p) { if (p.player === 1) p1++;
                        else p2++; }
                }
            }
            topCount.textContent = p1;
            bottomCount.textContent = p2;
        }

        // --- Turn indicators ---
        function updateTurnIndicators() {
            if (isGameOver) {
                topTurn.classList.remove('active');
                bottomTurn.classList.remove('active');
                return;
            }
            topTurn.classList.toggle('active', currentPlayer === 1);
            bottomTurn.classList.toggle('active', currentPlayer === 2);
            topSection.style.borderBottomColor = currentPlayer === 1 ? '#ffd700' : '#5a3424';
            bottomSection.style.borderTopColor = currentPlayer === 2 ? '#ffd700' : '#5a3424';
        }

        // --- Check if a square is threatened by a capture from opponent ---
        function isSquareThreatened(row, col, byPlayer) {
            // byPlayer is the opponent player number
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const piece = board[r][c];
                    if (piece && piece.player === byPlayer) {
                        // Generate capture moves for this piece (without the bargo filter, to avoid recursion)
                        // We'll just check if any capture move lands on (row, col)
                        const moves = getRawCaptureMoves(r, c);
                        for (const m of moves) {
                            if (m.row === row && m.col === col) return true;
                        }
                    }
                }
            }
            return false;
        }

        // --- Raw capture moves (without bargo filter) for threat detection ---
        function getRawCaptureMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];
            const player = piece.player;
            const isKing = piece.king;
            const moves = [];
            const captureDirs = [-1, 1];
            for (const d of captureDirs) {
                for (const dc of [-1, 1]) {
                    if (isKing) {
                        let rr = row + d,
                            cc = col + dc;
                        let foundOpponent = false;
                        let oppRow = -1,
                            oppCol = -1;
                        while (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) {
                            if (board[rr][cc] !== null) {
                                if (board[rr][cc].player !== player) {
                                    foundOpponent = true;
                                    oppRow = rr;
                                    oppCol = cc;
                                }
                                break;
                            }
                            rr += d;
                            cc += dc;
                        }
                        if (foundOpponent) {
                            let landR = oppRow + d,
                                landC = oppCol + dc;
                            while (landR >= 0 && landR < SIZE && landC >= 0 && landC < SIZE) {
                                if (board[landR][landC] === null) {
                                    moves.push({ row: landR, col: landC, capture: true, captures: [{ row: oppRow, col: oppCol }] });
                                } else break;
                                landR += d;
                                landC += dc;
                            }
                        }
                    } else {
                        const nr = row + 2 * d;
                        const nc = col + 2 * dc;
                        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
                        const midR = row + d,
                            midC = col + dc;
                        const mid = board[midR][midC];
                        if (mid && mid.player !== player && board[nr][nc] === null) {
                            moves.push({ row: nr, col: nc, capture: true, captures: [{ row: midR, col: midC }] });
                        }
                    }
                }
            }
            return moves;
        }

        // --- Get valid moves with Bargo rule ---
        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];
            const player = piece.player;
            const isKing = piece.king;
            const dir = player === 1 ? 1 : -1;
            const moves = [];

            // Regular moves (non-capture)
            if (!mustCapture) {
                const dirs = isKing ? [-1, 1] : [dir];
                for (const d of dirs) {
                    for (const dc of [-1, 1]) {
                        let nr = row + d;
                        let nc = col + dc;
                        if (isKing) {
                            let blocked = false;
                            while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && !blocked) {
                                if (board[nr][nc] === null) {
                                    moves.push({ row: nr, col: nc, capture: false, captures: [] });
                                } else {
                                    blocked = true;
                                }
                                nr += d;
                                nc += dc;
                            }
                        } else {
                            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === null) {
                                moves.push({ row: nr, col: nc, capture: false, captures: [] });
                            }
                        }
                    }
                }
            }

            // Capture moves (both forward and backward)
            const captureDirs = [-1, 1];
            for (const d of captureDirs) {
                for (const dc of [-1, 1]) {
                    if (isKing) {
                        let rr = row + d,
                            cc = col + dc;
                        let foundOpponent = false;
                        let oppRow = -1,
                            oppCol = -1;
                        while (rr >= 0 && rr < SIZE && cc >= 0 && cc < SIZE) {
                            if (board[rr][cc] !== null) {
                                if (board[rr][cc].player !== player) {
                                    foundOpponent = true;
                                    oppRow = rr;
                                    oppCol = cc;
                                }
                                break;
                            }
                            rr += d;
                            cc += dc;
                        }
                        if (foundOpponent) {
                            let landR = oppRow + d,
                                landC = oppCol + dc;
                            while (landR >= 0 && landR < SIZE && landC >= 0 && landC < SIZE) {
                                if (board[landR][landC] === null) {
                                    moves.push({
                                        row: landR,
                                        col: landC,
                                        capture: true,
                                        captures: [{ row: oppRow, col: oppCol }]
                                    });
                                } else break;
                                landR += d;
                                landC += dc;
                            }
                        }
                    } else {
                        const nr = row + 2 * d;
                        const nc = col + 2 * dc;
                        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
                        const midR = row + d,
                            midC = col + dc;
                        const mid = board[midR][midC];
                        if (mid && mid.player !== player && board[nr][nc] === null) {
                            moves.push({ row: nr, col: nc, capture: true, captures: [{ row: midR, col: midC }] });
                        }
                    }
                }
            }

            // ---- Bargo filter: for capture moves, check if the piece will be recaptured ----
            const filteredMoves = moves.filter(m => {
                if (!m.capture) return true; // non-capture always allowed
                // Simulate the capture
                const captured = m.captures;
                // Remove captured pieces temporarily
                const removed = [];
                for (const cap of captured) {
                    if (board[cap.row] && board[cap.row][cap.col]) {
                        removed.push({ row: cap.row, col: cap.col, piece: board[cap.row][cap.col] });
                        board[cap.row][cap.col] = null;
                    }
                }
                // Move the piece to destination
                const movingPiece = board[row][col];
                board[row][col] = null;
                board[m.row][m.col] = movingPiece;

                // Check if opponent can capture the moved piece
                const opponent = player === 1 ? 2 : 1;
                const threatened = isSquareThreatened(m.row, m.col, opponent);

                // Undo
                board[m.row][m.col] = null;
                board[row][col] = movingPiece;
                for (const rmv of removed) {
                    board[rmv.row][rmv.col] = rmv.piece;
                }

                // If threatened, disallow this capture (bargo)
                return !threatened;
            });

            // ---- Chain capture handling ----
            if (captureChain.length > 0) {
                const last = captureChain[captureChain.length - 1];
                if (last.row === row && last.col === col) {
                    // Only allow capture moves that don't recapture already captured pieces
                    const chainFiltered = filteredMoves.filter(m => {
                        if (!m.capture) return false;
                        for (const cap of m.captures) {
                            for (const prev of captureChain) {
                                if (prev.row === cap.row && prev.col === cap.col) return false;
                            }
                        }
                        return true;
                    });
                    return chainFiltered;
                }
                return [];
            }

            // ---- Mandatory capture ----
            const hasCaptures = filteredMoves.some(m => m.capture);
            if (hasCaptures) {
                mustCapture = true;
                return filteredMoves.filter(m => m.capture);
            }

            mustCapture = false;
            return filteredMoves;
        }

        // --- Check if player has any moves ---
        function hasAnyMoves(player) {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = board[r][c];
                    if (p && p.player === player) {
                        const moves = getValidMoves(r, c);
                        if (moves.length > 0) return true;
                    }
                }
            }
            return false;
        }

        // --- Execute a move ---
        function executeMove(fromRow, fromCol, toRow, toCol, captures) {
            const piece = board[fromRow][fromCol];
            if (!piece) return false;

            // Remove captured pieces
            const capturedPieces = [];
            for (const cap of captures) {
                if (board[cap.row] && board[cap.row][cap.col]) {
                    capturedPieces.push({ row: cap.row, col: cap.col, piece: board[cap.row][cap.col] });
                    board[cap.row][cap.col] = null;
                }
            }

            // Move piece
            board[toRow][toCol] = piece;
            board[fromRow][fromCol] = null;

            // Check promotion
            let promoted = false;
            if (!piece.king) {
                if (piece.player === 1 && toRow === SIZE - 1) {
                    piece.king = true;
                    promoted = true;
                } else if (piece.player === 2 && toRow === 0) {
                    piece.king = true;
                    promoted = true;
                }
            }

            // Check for chain captures
            const chainMoves = getValidMoves(toRow, toCol);
            const chainCaptures = chainMoves.filter(m => m.capture);

            if (chainCaptures.length > 0 && capturedPieces.length > 0) {
                captureChain.push(...capturedPieces);
                selected = { row: toRow, col: toCol };
                validMoves = chainCaptures;
                mustCapture = true;
                renderBoard();
                return true;
            }

            // End of move
            captureChain = [];
            selected = null;
            validMoves = [];
            mustCapture = false;

            // Check win
            checkWin();

            if (!isGameOver) {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                if (!hasAnyMoves(currentPlayer)) {
                    winner = currentPlayer === 1 ? 2 : 1;
                    isGameOver = true;
                    showGameOver(winner);
                }
            }

            renderBoard();
            return true;
        }

        // --- Check win condition ---
        function checkWin() {
            let p1 = 0,
                p2 = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const p = board[r][c];
                    if (p) { if (p.player === 1) p1++;
                        else p2++; }
                }
            }
            if (p1 === 0) { winner = 2;
                isGameOver = true;
                showGameOver(2); return true; }
            if (p2 === 0) { winner = 1;
                isGameOver = true;
                showGameOver(1); return true; }
            if (!hasAnyMoves(currentPlayer)) {
                winner = currentPlayer === 1 ? 2 : 1;
                isGameOver = true;
                showGameOver(winner);
                return true;
            }
            return false;
        }

        // --- Show game over ---
        function showGameOver(winningPlayer) {
            const losingPlayer = winningPlayer === 1 ? 2 : 1;
            const winStatus = winningPlayer === 1 ? topStatus : bottomStatus;
            const loseStatus = losingPlayer === 1 ? topStatus : bottomStatus;

            winStatus.textContent = '🎉 PANALO!';
            winStatus.className = 'status-msg show win';
            loseStatus.textContent = '💔 GAME OVER';
            loseStatus.className = 'status-msg show lose';

            darkOverlay.classList.add('show');
            gameOverText.textContent = winningPlayer === 1 ? '🏆 Player 1 Wins!' : '🏆 Player 2 Wins!';
            gameOverText.className = 'game-over-text show win-text';
            overlay.classList.add('active');
            startFireworks();
            restartBtn.classList.add('show');
            updateTurnIndicators();
        }

        // --- Piece click handler ---
        function onPieceClick(row, col) {
            if (isGameOver || isAnimating) return;
            const piece = board[row][col];
            if (!piece || piece.player !== currentPlayer) return;

            if (captureChain.length > 0) {
                const last = captureChain[captureChain.length - 1];
                if (last.row !== row || last.col !== col) return;
            }

            const moves = getValidMoves(row, col);
            if (moves.length === 0) return;

            selected = { row, col };
            validMoves = moves;
            renderBoard();
        }

        // --- Square click handler ---
        function onSquareClick(row, col) {
            if (isGameOver || isAnimating || !selected) return;

            const move = validMoves.find(m => m.row === row && m.col === col);
            if (!move) {
                selected = null;
                validMoves = [];
                renderBoard();
                return;
            }

            isAnimating = true;
            const fromRow = selected.row;
            const fromCol = selected.col;

            animateMove(fromRow, fromCol, row, col, move.captures || [], () => {
                executeMove(fromRow, fromCol, row, col, move.captures || []);
                isAnimating = false;
                if (!isGameOver && captureChain.length === 0) {
                    selected = null;
                    validMoves = [];
                    renderBoard();
                }
            });
        }

        // --- Animate move ---
        function animateMove(fromRow, fromCol, toRow, toCol, captures, callback) {
            const squares = $$('.square');
            let fromSq = squares.find(s => parseInt(s.dataset.row) === fromRow && parseInt(s.dataset.col) === fromCol);
            let toSq = squares.find(s => parseInt(s.dataset.row) === toRow && parseInt(s.dataset.col) === toCol);

            if (!fromSq || !toSq) { callback(); return; }

            const pieceEl = fromSq.querySelector('.piece');
            if (!pieceEl) { callback(); return; }

            const fromRect = fromSq.getBoundingClientRect();
            const toRect = toSq.getBoundingClientRect();

            const clone = pieceEl.cloneNode(true);
            clone.classList.add('moving');
            clone.style.position = 'fixed';
            clone.style.left = fromRect.left + 'px';
            clone.style.top = fromRect.top + 'px';
            clone.style.width = fromRect.width + 'px';
            clone.style.height = fromRect.height + 'px';
            clone.style.pointerEvents = 'none';
            clone.style.zIndex = '100';
            clone.style.borderRadius = '50%';
            document.body.appendChild(clone);

            pieceEl.style.opacity = '0';

            requestAnimationFrame(() => {
                clone.style.transition = 'all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1)';
                clone.style.left = toRect.left + 'px';
                clone.style.top = toRect.top + 'px';
                clone.style.transform = 'scale(1.05)';
            });

            setTimeout(() => {
                clone.remove();
                pieceEl.style.opacity = '1';
                callback();
            }, 300);
        }

        // --- FIREWORKS ---
        let fireworks = [];
        let fwParticles = [];
        let fwRunning = false;
        let fwRAF = null;

        function startFireworks() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            canvas.classList.add('active');
            fwRunning = true;
            fireworks = [];
            fwParticles = [];
            for (let i = 0; i < 6; i++) {
                setTimeout(() => launchFirework(), i * 400 + Math.random() * 300);
            }
            loopFireworks();
        }

        function launchFirework() {
            if (!fwRunning) return;
            const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
            const y = Math.random() * canvas.height * 0.5 + canvas.height * 0.1;
            const color = `hsl(${Math.random() * 360}, 90%, 60%)`;
            const size = 40 + Math.random() * 50;
            fireworks.push({ x, y, color, size, life: 1, maxLife: 1 });
        }

        function loopFireworks() {
            if (!fwRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.life -= 0.015;
                if (fw.life <= 0) {
                    const count = 30 + Math.floor(Math.random() * 30);
                    for (let j = 0; j < count; j++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 2 + Math.random() * 5;
                        const colors = [
                            `hsl(${Math.random() * 360}, 100%, 60%)`,
                            `hsl(${Math.random() * 360}, 100%, 70%)`,
                            `hsl(${Math.random() * 360}, 100%, 50%)`,
                            '#ffd700', '#ff6b6b', '#4ecdc4', '#ffe66d', '#ff6bff'
                        ];
                        fwParticles.push({
                            x: fw.x,
                            y: fw.y,
                            vx: Math.cos(angle) * speed * (0.5 + Math.random()),
                            vy: Math.sin(angle) * speed * (0.5 + Math.random()),
                            life: 1,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            size: 2 + Math.random() * 4,
                            decay: 0.008 + Math.random() * 0.015
                        });
                    }
                    fireworks.splice(i, 1);
                    if (fwRunning && Math.random() < 0.3) {
                        setTimeout(launchFirework, 100 + Math.random() * 300);
                    }
                    continue;
                }
                const progress = 1 - fw.life;
                const yPos = fw.y + (canvas.height * 0.8 - fw.y) * progress;
                const alpha = fw.life;
                ctx.beginPath();
                ctx.arc(fw.x, yPos, 3 + 6 * (1 - fw.life), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
                ctx.fill();
                ctx.shadowColor = fw.color;
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(fw.x, yPos, 2, 0, Math.PI * 2);
                ctx.fillStyle = fw.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            for (let i = fwParticles.length - 1; i >= 0; i--) {
                const p = fwParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05;
                p.vx *= 0.99;
                p.vy *= 0.99;
                p.life -= p.decay;
                if (p.life <= 0) { fwParticles.splice(i, 1); continue; }
                const alpha = p.life;
                ctx.globalAlpha = alpha;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            if (fwRunning) {
                fwRAF = requestAnimationFrame(loopFireworks);
            }
        }

        function stopFireworks() {
            fwRunning = false;
            if (fwRAF) { cancelAnimationFrame(fwRAF);
                fwRAF = null; }
            canvas.classList.remove('active');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fireworks = [];
            fwParticles = [];
        }

        // --- Restart ---
        function restartGame() {
            stopFireworks();
            board = initBoard();
            currentPlayer = 1;
            selected = null;
            validMoves = [];
            mustCapture = false;
            captureChain = [];
            isGameOver = false;
            winner = null;
            isAnimating = false;

            topStatus.className = 'status-msg';
            topStatus.textContent = '';
            bottomStatus.className = 'status-msg';
            bottomStatus.textContent = '';

            darkOverlay.classList.remove('show');
            gameOverText.className = 'game-over-text';
            gameOverText.textContent = '';
            overlay.classList.remove('active');
            restartBtn.classList.remove('show');

            renderBoard();
            updateTurnIndicators();
        }

        // --- Resize canvas ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // --- Init ---
        function init() {
            board = initBoard();
            renderBoard();
            updateTurnIndicators();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            restartBtn.addEventListener('click', restartGame);
            restartBtn.addEventListener('touchend', (e) => { e.preventDefault();
                restartGame(); });
        }

        window.addEventListener('resize', resizeCanvas);
        init();

        console.log('🇵🇭 Filipino Dama · Bargo rule active: no unsafe captures.');
        console.log('♟️ King slides, backward capture, marble pieces.');
    </script>
